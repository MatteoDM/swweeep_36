# This fixes an issue with some of my machines not being able to connect to ZMK
# https://discord.com/channels/719497620560543766/1196958410147639386/1203582993864720394
# Note to self: add to all my personal keyboard configs :)
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n
CONFIG_ZMK_RGB_UNDERGLOW=n
# CONFIG_WS2812_STRIP=n
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000 
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_USB=y
# How to build
# cd app
# west build -d build/swweeep/right --pristine -b "nice_nano" -- -DSHIELD="swweeep_right"
# west build -d build/swweeep/left --pristine -b "nice_nano" -- -DSHIELD="swweeep_left"
# west build -d build/swweeep/reset --pristine -b "nice_nano" -- -DSHIELD="settings_reset" 